{% extends "base.html" %}

{% block title %}{% if company %}Edit Company{% else %}Add Company{% endif %} - Job Application Tracker{% endblock %}

{% block content %}
<h1>{% if company %}Edit Company{% else %}Add Company{% endif %}</h1>

<form method="post" class="form">
    <div class="form-group">
        <label for="company_name">Company Name *</label>
        <input type="text" id="company_name" name="company_name" required value="{{ company.company_name if company else '' }}">
    </div>

    <div class="form-group">
        <label for="industry">Industry</label>
        <input type="text" id="industry" name="industry" value="{{ company.industry if company else '' }}">
    </div>

    <div class="form-group">
        <label for="website">Website</label>
        <input type="url" id="website" name="website" value="{{ company.website if company else '' }}">
    </div>

    <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" value="{{ company.city if company else '' }}">
    </div>

    <div class="form-group">
        <label for="state">State</label>
        <input type="text" id="state" name="state" value="{{ company.state if company else '' }}">
    </div>

    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes">{{ company.notes if company else '' }}</textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{% if company %}Update{% else %}Add{% endif %} Company</button>
        <a href="{{ url_for('companies') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
