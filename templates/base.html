<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Application Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="{{ url_for('dashboard') }}" class="navbar-logo">Job Tracker</a>
            <ul class="navbar-menu">
                <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('companies') }}">Companies</a></li>
                <li><a href="{{ url_for('jobs') }}">Jobs</a></li>
                <li><a href="{{ url_for('applications') }}">Applications</a></li>
                <li><a href="{{ url_for('contacts') }}">Contacts</a></li>
                <li><a href="{{ url_for('job_match') }}">Job Match</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>Job Application Tracker</p>
    </footer>
</body>
</html>
