{% extends "base.html" %}

{% block title %}{% if contact %}Edit Contact{% else %}Add Contact{% endif %} - Job Application Tracker{% endblock %}

{% block content %}
<h1>{% if contact %}Edit Contact{% else %}Add Contact{% endif %}</h1>

<form method="post" class="form">
    <div class="form-group">
        <label for="company_id">Company</label>
        <select id="company_id" name="company_id">
            <option value="">-- Select Company --</option>
            {% for company in companies %}
            <option value="{{ company.company_id }}" {% if contact and contact.company_id == company.company_id %}selected{% endif %}>{{ company.company_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="contact_name">Contact Name *</label>
        <input type="text" id="contact_name" name="contact_name" required value="{{ contact.contact_name if contact else '' }}">
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ contact.title if contact else '' }}">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ contact.email if contact else '' }}">
    </div>

    <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" value="{{ contact.phone if contact else '' }}">
    </div>

    <div class="form-group">
        <label for="linkedin_url">LinkedIn URL</label>
        <input type="url" id="linkedin_url" name="linkedin_url" value="{{ contact.linkedin_url if contact else '' }}">
    </div>

    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes">{{ contact.notes if contact else '' }}</textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{% if contact %}Update{% else %}Add{% endif %} Contact</button>
        <a href="{{ url_for('contacts') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
